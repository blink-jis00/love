<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            background-image: linear-gradient(to bottom, #e68a4d, #fddbd2);
            /* Keep this hidden by default so the NO button is hard to catch! */
            overflow: hidden; 
        }

        .content-container {
            position: relative;
            z-index: 1;
        }

        .top-banner {
            background-color: black;
            color: white;
            padding: 10px 20px;
            font-size: 20px;
            font-weight: bold;
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 0 0 10px 10px;
            z-index: 2;
        }

        .bear-image {
            display: block;
            margin: 50px auto 30px;
            max-width: 250px;
            height: auto;
        }

        h1.question-text {
            color: #4A4A4A;
            font-size: 36px;
            margin-bottom: 20px;
            position: relative;
        }

        .heart-emoji-centered {
            display: block;
            margin: 0 auto 30px;
            font-size: 30px;
            color: red;
        }

        .button-area {
            position: relative;
            display: inline-block;
        }

        .nav-button {
            padding: 15px 40px;
            font-size: 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            margin: 0 10px;
        }

        #no-button {
            background-color: #4A4A4A;
            color: white;
            position: absolute;
            top: -160px;
            left: -150px;
            transform: rotate(-5deg);
            transition: all 0.2s ease-out;
            opacity: 0.9;
        }

        #yes-button {
            background-color: #FF9999;
            color: white;
            transition: transform 0.2s;
        }

        #yes-button:hover {
            transform: scale(1.1);
        }

        #success-state {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: rgba(253, 219, 210, 0.9);
            z-index: 3;
        }

        #success-gif {
            max-width: 300px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        #success-message {
            color: #4A4A4A;
            font-size: 32px;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>

<body>

    <div class="top-banner">Send me this😊</div>


    
    <audio id="first-music" autoplay loop muted>
        <source src="firstsong.mp3" type="audio/mpeg">
    </audio>

    <audio id="success-music" loop>
        <source src="secondsong.mp3" type="audio/mpeg">
    </audio>


    <div class="content-container">
        <img src="https://media.tenor.com/uLEL5eZovF4AAAAj/bubu-dudu-sseeyall.gif" alt="Bear holding a heart and rose"
            class="bear-image">

        <h1 class="question-text">Will You Be My Valentine?</h1>
        <span class="heart-emoji-centered">❤️</span>

        <div class="button-area">
            <button id="yes-button" class="nav-button" onclick="celebrate()">✨ YES 😊</button>
            <button id="no-button" class="nav-button" onmouseover="runAwayNo(event)" ontouchstart="runAwayNo(event)">NO 🥹</button>
        </div>
    </div>

    <div id="success-state">
        <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" alt="Kissing bears"
            id="success-gif">
        <h2 id="success-message">❤️ Yay! I knew you would say yes! ❤️</h2>
    </div>

    <script>
        // Force the page to reset properly if they use the browser refresh button
        window.onload = function() {
            document.body.style.overflow = "hidden"; // Lock screen initially
            document.querySelector(".content-container").style.display = "block";
            document.getElementById("success-state").style.display = "none";
            
            var noButton = document.getElementById("no-button");
            noButton.style.position = "absolute";
            noButton.style.top = "-160px";
            noButton.style.left = "-150px";
            noButton.style.transform = "rotate(-5deg)";
            noButton.style.opacity = "0.9";
        };

        // Make NO button run away
        function runAwayNo(event) {
            if (event) {
                event.preventDefault(); 
            }

            var noButton = document.getElementById("no-button");
            var padding = 20; 
            var randomX = Math.floor(Math.random() * (window.innerWidth - noButton.offsetWidth - padding));
            var randomY = Math.floor(Math.random() * (window.innerHeight - noButton.offsetHeight - padding));

            noButton.style.position = "fixed";
            noButton.style.top = Math.max(padding, randomY) + "px";
            noButton.style.left = Math.max(padding, randomX) + "px";
            noButton.style.transform = "rotate(0deg)"; 
            noButton.style.opacity = 1; 
        }

        // Show success state and handle timers/refreshing
        function celebrate() {


            // play success music
            document.getElementById("success-music").volume = 0.5;
            document.getElementById("success-music").play();
            
            document.querySelector(".content-container").style.display = "none";
            document.getElementById("success-state").style.display = "flex";

            // UNLOCK the screen so they can pull-to-refresh on this page!
            document.body.style.overflow = "auto";

            // 10 Second Timer
            setTimeout(function() {
                
                // Re-lock the screen so the NO button works properly again
                document.body.style.overflow = "hidden";
                
                // Show the main screen again
                document.querySelector(".content-container").style.display = "block";
                document.getElementById("success-state").style.display = "none";
                
                // Put the NO button back in its original spot
                var noButton = document.getElementById("no-button");
                noButton.style.position = "absolute";
                noButton.style.top = "-160px";
                noButton.style.left = "-150px";
                noButton.style.transform = "rotate(-5deg)";
                noButton.style.opacity = "0.9";
            }, 10000); // 10000 milliseconds = 10 seconds
        }
    </script>
</body>

</html>
